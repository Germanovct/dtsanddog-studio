services:
  - type: web
    name: dtsdog-api-worker
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd ai-agent && uvicorn api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PAGESPEED_API_KEY
        sync: false
